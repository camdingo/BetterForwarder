# Multi-Forwarder Configuration
# Each [connection.NAME] section defines a stream

[connection.DATA_TYPE1]
remote_host = 127.0.0.1
remote_port = 5000
forward_port = 8001
keyword = TEST          ; optional 4-char magic bytes sent on connect
;watchdog_timeout = 600 ; optional: seconds without data before forcing reconnect (default: 600)

[connection.DATA_TYPE2]
remote_host = 127.0.0.1
remote_port = 5001
forward_port = 8002
keyword = TES2

# Notes:
# - keyword: optional but must be exactly 4 characters if specified
# - forward_port: must be unique across all connections
# - remote_host: can be IP address or hostname
# - watchdog_timeout: optional seconds without data before forcing reconnect (default: 600 = 10 minutes)
#   Examples: 300 (5 min), 600 (10 min), 1800 (30 min)
# - Use semicolon (;) to comment out connections
