# Multi-Forwarder Configuration
# Each [connection.NAME] section defines a stream

[connection.DATA_TYPE1]
remote_host = 127.0.0.1
remote_port = 5000
forward_port = 8001
keyword = TEST          ; optional 4-char magic bytes sent on connect

[connection.DATA_TYPE2]
remote_host = 127.0.0.1
remote_port = 5001
forward_port = 8002
keyword = TES2

# Example: Production data feed
;[connection.PRODUCTION]
;remote_host = 192.168.1.100
;remote_port = 5555
;forward_port = 9001
;keyword = PROD

# Example: Market data feed
;[connection.MARKET_DATA]
;remote_host = data.example.com
;remote_port = 8888
;forward_port = 9002
;keyword = MKTD

# Notes:
# - keyword is optional but must be exactly 4 characters if specified
# - forward_port must be unique across all connections
# - remote_host can be IP address or hostname
# - Use semicolon (;) to comment out connections